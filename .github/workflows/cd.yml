name: Deploy Agent to Vertex AI

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy & Capture Endpoint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install google-cloud-aiplatform[agent_engines] google-cloud-storage

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Deploy to Vertex AI
        id: deploy
        run: |
          # Look for the GCP deployment script
          DEPLOY_SCRIPT=$(find . -name "deploy.py" -path "*/gcp/*" | head -n 1)
          if [ -z "$DEPLOY_SCRIPT" ]; then
            DEPLOY_SCRIPT=$(find . -name "deploy.py" | head -n 1)
          fi
          
          DEPLOY_STATUS="success"
          if [ -n "$DEPLOY_SCRIPT" ]; then
            echo "Found deployment script: $DEPLOY_SCRIPT"
            echo "---"
            python "$DEPLOY_SCRIPT" 2>&1 | tee deploy_output.txt
            DEPLOY_EXIT_CODE=${PIPESTATUS[0]}
            echo "---"
            echo "Deploy exit code: $DEPLOY_EXIT_CODE"
            
            if [ "$DEPLOY_EXIT_CODE" -ne 0 ]; then
              DEPLOY_STATUS="failed"
            fi
            
            # Extract endpoint URL from output (handles ENDPOINT_URL=https://... format)
            ENDPOINT_URL=$(grep -oP 'ENDPOINT_URL=\K.+' deploy_output.txt | head -n 1)
            
            # Fallback: try to find any console.cloud.google.com or .run.app URL
            if [ -z "$ENDPOINT_URL" ]; then
              ENDPOINT_URL=$(grep -oE 'https://console\.cloud\.google\.com/[^ ]+' deploy_output.txt | head -n 1)
            fi
            if [ -z "$ENDPOINT_URL" ]; then
              ENDPOINT_URL=$(grep -oE 'https://[a-zA-Z0-9.-]+\.run\.app[^ ]*' deploy_output.txt | head -n 1)
            fi
            
            # Final fallback: construct a Vertex AI console URL
            if [ -z "$ENDPOINT_URL" ]; then
              ENDPOINT_URL="https://console.cloud.google.com/vertex-ai/agents?project=$GOOGLE_CLOUD_PROJECT"
            fi
            
            echo "endpoint=$ENDPOINT_URL" >> $GITHUB_OUTPUT
            echo "status=$DEPLOY_STATUS" >> $GITHUB_OUTPUT
            
            if [ "$DEPLOY_STATUS" = "success" ]; then
              echo "### ✅ Deployment Successful" >> $GITHUB_STEP_SUMMARY
              echo "Your agent has been deployed to Vertex AI via GitHub Actions CI/CD." >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "🚀 **Vertex AI Console:** [$ENDPOINT_URL]($ENDPOINT_URL)" >> $GITHUB_STEP_SUMMARY
            else
              echo "### ⚠️ Deployment Script Ran With Errors" >> $GITHUB_STEP_SUMMARY
              echo "The deploy script encountered errors. Check the logs below." >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "🔗 **Vertex AI Console:** [$ENDPOINT_URL]($ENDPOINT_URL)" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
              tail -20 deploy_output.txt >> $GITHUB_STEP_SUMMARY
              echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            fi
            
          else
            echo "No deploy.py found!"
            ENDPOINT_URL="https://console.cloud.google.com/vertex-ai/agents?project=$GOOGLE_CLOUD_PROJECT"
            echo "endpoint=$ENDPOINT_URL" >> $GITHUB_OUTPUT
            echo "status=skipped" >> $GITHUB_OUTPUT
            echo "### 📋 No Deploy Script Found" >> $GITHUB_STEP_SUMMARY
            echo "No gcp/deploy.py was found in the repository." >> $GITHUB_STEP_SUMMARY
            echo "🔗 **Vertex AI Console:** [$ENDPOINT_URL]($ENDPOINT_URL)" >> $GITHUB_STEP_SUMMARY
          fi
        env:
          GOOGLE_CLOUD_PROJECT: ${{ secrets.GOOGLE_CLOUD_PROJECT }}
          GOOGLE_CLOUD_LOCATION: ${{ secrets.GOOGLE_CLOUD_LOCATION }}
          GOOGLE_CLOUD_STAGING_BUCKET: ${{ secrets.GOOGLE_CLOUD_STAGING_BUCKET }}
          
      - name: Upload Deployment Logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: deployment-logs
          path: deploy_output.txt
          if-no-files-found: ignore
